<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreeTradingHub</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0b1020;
            color: #e5e7eb;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.15), transparent 35%),
                radial-gradient(circle at top right, rgba(16,185,129,0.12), transparent 30%),
                linear-gradient(180deg, #0b1020 0%, #111827 100%);
        }

        .container {
            width: min(1400px, 92%);
            margin: 0 auto;
            padding: 30px 0 60px;
        }

        .hero {
            text-align: center;
            padding: 40px 20px 24px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .hero p {
            margin: 16px auto 0;
            max-width: 760px;
            font-size: 18px;
            line-height: 1.6;
            color: #9ca3af;
        }

        .hero-badge {
            display: inline-block;
            margin-bottom: 18px;
            padding: 8px 14px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            color: #cbd5e1;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .tabs-wrapper {
            margin-top: 24px;
            margin-bottom: 22px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            background: rgba(17, 24, 39, 0.72);
            box-shadow: 0 10px 30px rgba(0,0,0,0.20);
            backdrop-filter: blur(8px);
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .tab-btn {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #cbd5e1;
            padding: 12px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab-btn:hover {
            background: rgba(59,130,246,0.14);
            border-color: rgba(59,130,246,0.30);
            color: #ffffff;
            transform: translateY(-1px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(59,130,246,0.95), rgba(37,99,235,0.95));
            border-color: rgba(96,165,250,0.5);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(37,99,235,0.28);
        }

        .widget-card {
            background: rgba(17, 24, 39, 0.82);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.28);
            backdrop-filter: blur(8px);
        }

        .widget-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 18px 22px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
        }

        .widget-title {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: #f9fafb;
        }

        .widget-subtitle {
            font-size: 13px;
            color: #9ca3af;
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.25);
            padding: 6px 10px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .tradingview_container {
            width: 100%;
            height: 760px;
            background: #0f172a;
        }

        .footer {
            margin-top: 36px;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container {
                width: 95%;
                padding-top: 20px;
            }

            .hero {
                padding: 20px 10px 20px;
            }

            .hero p {
                font-size: 16px;
            }

            .widget-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .widget-title {
                font-size: 20px;
            }

            .tradingview_container {
                height: 620px;
            }

            .tab-btn {
                padding: 10px 14px;
                font-size: 13px;
            }

            .tabs {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <div class="hero-badge">FreeTradingHub • Premium Indicators</div>
            <h1>TradingView Indicators Hub</h1>
            <p>
                A collection of trading indicators and tools for market analysis.
            </p>
        </section>

        <section class="tabs-wrapper">
            <div class="tabs" id="tabs"></div>
        </section>

        <section class="widget-card">
            <div class="widget-header">
                <h2 class="widget-title" id="active-widget-title">Algo TEM</h2>
                <div class="widget-subtitle" id="active-widget-badge">XAUUSD • 5m</div>
            </div>
            <div class="tradingview_container" id="tradingview_chart"></div>
        </section>

        <div class="footer">
            © FreeTradingHub
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <script>
        const widgets = [
            { name: "Algo TEM", studies: ["PUB;6daafb2cabe6419d98ae25229d2327f8"] },
            /*{ name: "Algo TEM", studies: ["PUB;ff5b3733e74c441bb464b361c4665386"] },*/
            /*{ name: "ANN", studies: ["PUB;8aaf9bc7fa9444cb8edf174e3a0d8f31"] },*/
            { name: "Sniper Pro", studies: ["PUB;6c003d30b2154ef3a31074d5c703954f", "PUB;e6adb5e5246c43f4a8dcffde5c98db4e", "PUB;162198dcae874d5da28f7b048feb76e7", "PUB;b6587ba7dc7b4489927cfd94d1fb8a9f", "PUB;0bf15eb0edba447f84e19fce69391ccb"] },
            { name: "Nexus", studies: ["PUB;ae6d252afb6d44a68ddd3b4d587388f4"] },
            { name: "Golden Era New", studies: ["PUB;51017c1544164998b0fbb32d5463961c"] },
            { name: "Quantum", studies: ["PUB;3b86bd1192124fd98583490bb7508041"] },
            { name: "Wolf X", studies: ["PUB;862506c546514212b9728a634dbc7152"] },
            { name: "Trend Wave", studies: [
                "PUB;f6e13cfa8fb1462493984f329925c02b",
                "PUB;6ac2587549144bc9a8cd6ae15730895b",
                "PUB;af2dc588b5f34409a046f96b625c9b6b",
                "PUB;06fc6d6e9252415c9afdac437e0764dc"
            ]},
            { name: "Trend Wave Pro", studies: ["PUB;00ec48baf0ee43f0a43e1658bb54cdab", "PUB;38080827cf244587b5e7dbb9f272db0a"] },
            { name: "Smartmonics", studies: ["PUB;ec7a7c1c91c645519b35b9505b4169a9", "PUB;5bdd7bb857ba48d68bf573c3fe0a08c3"] },
            { name: "Liquidity Flow", studies: ["PUB;cfb67dca49e94b5ca341ab4c1bcf4d37", "PUB;b7b3fe63710742cb9f7db5bfa9695e5a"] },
            { name: "Sniper", studies: ["PUB;717dd00ad9c1445b84b39adfb5ed5f3d", "PUB;903a688ad7a34daf86cdd8c287df09cc"] },
            { name: "Price Hunter", studies: ["PUB;ba1af294fd5047fbbf5cfd0f66697725"] },
            { name: "Smart Scanner", studies: ["PUB;e378ef7473b14614a6b1fc5d4bba8061", "PUB;c4c0ec8c41b94497af0b385320c73964"] },
            { name: "Kill Shot", studies: ["PUB;e27eb354ed22477295be9c628e937a89"] },
            { name: "Indices Strategy", studies: ["PUB;f69d6a362b144d35a921707e4492d5c5", "PUB;4c1f3d8d7f314e2e9dcd28b1f707752e"] },
            { name: "LUX Support and Resistance", studies: ["PUB;NXS6SoOdr880Hrvh9vA36UcAjC14bOkc"] },
            { name: "Vumacha", studies: ["PUB;uA35GeckoTA2EfgI63SD2WCSmca4njxp"] }
        ];

        const tabsContainer = document.getElementById("tabs");
        const activeWidgetTitle = document.getElementById("active-widget-title");
        const activeWidgetBadge = document.getElementById("active-widget-badge");
        const chartContainerId = "tradingview_chart";

        function renderTabs(activeIndex) {
            tabsContainer.innerHTML = "";

            widgets.forEach((widget, index) => {
                const btn = document.createElement("button");
                btn.className = "tab-btn" + (index === activeIndex ? " active" : "");
                btn.textContent = widget.name;
                btn.addEventListener("click", () => loadWidget(index));
                tabsContainer.appendChild(btn);
            });
        }

        function renderTradingView(widget) {
            const container = document.getElementById(chartContainerId);
            container.innerHTML = "";

            new TradingView.widget({
                container_id: chartContainerId,
                width: "100%",
                height: "900",
                symbol: "OANDA:XAUUSD",
                interval: "5",
                timezone: "Europe/Berlin",
                theme: "dark",
                style: "1",
                locale: "pl",
                toolbar_bg: "#111827",
                hide_legend: false,
                hide_side_toolbar: false,
                hide_top_toolbar: false,
                enable_publishing: false,
                allow_symbol_change: true,
                hide_volume: true,
                studies: widget.studies
            });
        }

        function loadWidget(index) {
            const widget = widgets[index];
            activeWidgetTitle.textContent = widget.name;
            activeWidgetBadge.textContent = "XAUUSD • 5m";
            renderTabs(index);
            renderTradingView(widget);
        }

        loadWidget(0);
    </script>
</body>
</html>
